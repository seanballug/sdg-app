<h2>Suppliers</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let s of suppliers$ | async">
    <td>{{ s.id }}</td>
    <td>{{ s.name }}</td>
    <td>{{ s.email }}</td>
    <td>
      <button (click)="view(s.id)">View</button>
    </td>
  </tr>
</table>
